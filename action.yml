name: Anthill
description: Poll Intent for pending AgentEvents and dispatch execution workflows

inputs:
  intent_url:
    description: Intent API base URL
    required: true
  client_id:
    description: Pre-registered clientId for this runtime (X-Runtime-Client-Id)
    required: true
  github_token:
    description: GitHub token for dispatching workflows and git operations
    required: true
  opencode_api_key:
    description: OpenCode API key for the agent
    required: false
  brave_api_key:
    description: Brave Search API key (optional)
    required: false
  registry_token:
    description: GitHub token for pulling from GHCR (defaults to github_token)
    required: false
  branch:
    description: Target branch
    required: false
    default: main
  merge:
    description: Merge policy — auto or manual
    required: false
    default: manual
  model:
    description: AI model override
    required: false

runs:
  using: composite
  steps:
    - uses: yoennisrg/anthill-action/on-event@main
      with:
        intent_url: ${{ inputs.intent_url }}
        client_id: ${{ inputs.client_id }}
        github_token: ${{ inputs.github_token }}
        opencode_api_key: ${{ inputs.opencode_api_key }}
        brave_api_key: ${{ inputs.brave_api_key }}
        registry_token: ${{ inputs.registry_token || inputs.github_token }}
        branch: ${{ inputs.branch }}
        merge: ${{ inputs.merge }}
        model: ${{ inputs.model }}

name: Anthill — on-event
description: Poll Intent for pending AgentEvents and execute each one inline

inputs:
  intent_url:
    description: Intent API base URL
    required: true
  client_id:
    description: Pre-registered clientId for this runtime (X-Runtime-Client-Id)
    required: true
  github_token:
    description: GitHub token for git operations and GHCR
    required: true
  opencode_api_key:
    description: OpenCode API key for the agent
    required: false
  brave_api_key:
    description: Brave Search API key
    required: false
  registry_token:
    description: GitHub token for pulling from GHCR (defaults to github_token)
    required: false
  branch:
    description: Target branch
    required: false
    default: main
  merge:
    description: Merge policy (auto/manual)
    required: false
    default: manual
  model:
    description: AI model override
    required: false

runs:
  using: composite
  steps:
    - name: Install anthill CLI
      shell: bash
      run: |
        curl -sSL https://github.com/yoennisrg/anthill-action/releases/latest/download/anthill-linux-amd64 \
          -o /usr/local/bin/anthill
        chmod +x /usr/local/bin/anthill

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.registry_token || inputs.github_token }}

    - name: Poll and execute
      shell: bash
      env:
        ANTHILL_INTENT_URL: ${{ inputs.intent_url }}
        ANTHILL_CLIENT_ID: ${{ inputs.client_id }}
        ANTHILL_GITHUB_TOKEN: ${{ inputs.github_token }}
        GH_TOKEN: ${{ inputs.github_token }}
        ANTHILL_MERGE_TOKEN: ${{ inputs.github_token }}
        ANTHILL_REGISTRY_TOKEN: ${{ inputs.registry_token || inputs.github_token }}
        ANTHILL_OPENCODE_API_KEY: ${{ inputs.opencode_api_key }}
        ANTHILL_BRAVE_API_KEY: ${{ inputs.brave_api_key }}
        ANTHILL_BRANCH: ${{ inputs.branch }}
        ANTHILL_MERGE: ${{ inputs.merge }}
        ANTHILL_MODEL: ${{ inputs.model }}
      run: anthill poll
